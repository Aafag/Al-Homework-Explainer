name: CI/CD

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run static analysis
        run: python -m ruff check .

      - name: Run test suite
        run: python -m pytest

      - name: Build Docker image
        run: docker build -t ai-homework-explainer .

      - name: Smoke test container health endpoint
        run: |
          docker run -d --rm --name ai-homework-explainer-smoke -p 5000:5000 \
            -e INIT_EXTERNAL_SERVICES=0 \
            ai-homework-explainer
          trap 'docker stop ai-homework-explainer-smoke' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs ai-homework-explainer-smoke
          exit 1

  publish-and-deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        env:
          IMAGE_REPOSITORY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ai-homework-explainer
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${IMAGE_TAG::7}"
          docker buildx build \
            --push \
            --tag "${IMAGE_REPOSITORY}:latest" \
            --tag "${IMAGE_REPOSITORY}:${SHORT_SHA}" \
            .

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --show-error --silent --request POST "${RENDER_DEPLOY_HOOK_URL}"
