services:
  app:
    build: .
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      PORT: 5000
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/ai_homework_explainer.db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GEMINI_API_BASE: ${GEMINI_API_BASE:-https://aiplatform.googleapis.com/v1}
      GEMINI_AUTH_MODE: ${GEMINI_AUTH_MODE:-api_key}
      VERTEX_ACCESS_TOKEN: ${VERTEX_ACCESS_TOKEN:-}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      VERTEX_USE_PROJECT_ENDPOINT: ${VERTEX_USE_PROJECT_ENDPOINT:-0}
      MAX_QUESTION_LENGTH: ${MAX_QUESTION_LENGTH:-2000}
      INIT_EXTERNAL_SERVICES: ${INIT_EXTERNAL_SERVICES:-1}
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
