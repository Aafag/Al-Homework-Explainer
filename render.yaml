services:
  - type: web
    name: ai-homework-explainer
    runtime: python
    plan: free
    autoDeployTrigger: checksPass
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: deploymentdb
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_API_BASE
        value: https://aiplatform.googleapis.com/v1
      - key: GEMINI_AUTH_MODE
        value: api_key
      - key: MAX_QUESTION_LENGTH
        value: 2000
